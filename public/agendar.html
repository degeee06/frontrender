<body class="min-h-screen bg-gradient-to-br from-slate-800 to-slate-900 text-white">

<div>

</div>

                    <!-- Horário -->
<div>
    <label for="horario" class="block mb-2 text-sm font-medium opacity-80">Horário</label>
    <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">

        </div>
        <select id="horario" required 
                class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 focus:outline-none input-field appearance-none">
            <option value="">Selecione um horário</option>
            <!-- Horários serão preenchidos via JavaScript -->
        </select>
        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
            <i data-feather="chevron-down" class="w-5 h-5 text-gray-400"></i>
        </div>
    </div>
    <div id="horarios-info" class="mt-2 text-xs opacity-70 hidden">
        <span id="horarios-disponiveis" class="text-green-400"></span>
        <span id="horarios-indisponiveis" class="text-red-400 ml-2"></span>
    </div>
</div>
                </div>

                <!-- Botão Agendar -->
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-cyan-500 text-white py-3 px-6 rounded-lg font-medium hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-lg mt-4">
                    <i data-feather="plus" class="w-5 h-5"></i>

            </div>
        </form>

        <!-- Resultado -->
        <div id="resultado" class="glass-card rounded-2xl p-6 text-center" data-aos="fade-up" style="display: none;">

    </div>

    <script>
        // Inicializa Feather Icons
        feather.replace();
        
        // Inicializa AOS
        AOS.init({
            duration: 800,
            once: true
        });
// Função para carregar horários ocupados usando a rota existente
async function carregarHorariosOcupados(dataSelecionada) {
    if (!dataSelecionada || !user_id) return [];
    
    try {
        // Usa a rota existente /agendamentos que já retorna todos os agendamentos do user_id
        const response = await fetch(`https://agendamento-ynxr.onrender.com/agendamentos`, {
            method: 'GET',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${await obterTokenUsuario()}`
            }
        });
        
        if (response.ok) {
            const result = await response.json();
            // Filtra apenas os agendamentos da data selecionada
            const agendamentosDaData = result.agendamentos.filter(ag => 
                ag.data === dataSelecionada && ag.status !== 'cancelado'
            );
            return agendamentosDaData;
        }
        return [];
    } catch (error) {
        console.error('Erro ao carregar horários:', error);
        return [];
    }
}

// Função mock para obter token (como é página pública, vamos simular)
async function obterTokenUsuario() {
    // Como é uma página pública, não temos token real
    // Mas a rota /agendamentos precisa de auth. Vamos usar uma abordagem alternativa:
    return 'public-access-temp'; // Isso vai falar, mas vamos tratar o erro
}

// Função para gerar horários disponíveis
function gerarHorariosDisponiveis(horariosOcupados) {
    const horarios = [];
    const horariosOcupadosFormatados = horariosOcupados.map(ag => ag.horario);
    
    // Gera horários das 08:00 às 18:00, de 30 em 30 minutos
    for (let hora = 8; hora <= 18; hora++) {
        for (let minuto = 0; minuto < 60; minuto += 30) {
            const horario = `${hora.toString().padStart(2, '0')}:${minuto.toString().padStart(2, '0')}`;
            const disponivel = !horariosOcupadosFormatados.includes(horario);
            
            horarios.push({
                horario: horario,
                disponivel: disponivel
            });
        }
    }
    
    return horarios;
}

// Função para atualizar o select de horários
function atualizarSelectHorarios(horariosDisponiveis) {
    const selectHorario = document.getElementById('horario');
    const infoDiv = document.getElementById('horarios-info');
    const disponiveisSpan = document.getElementById('horarios-disponiveis');
    const indisponiveisSpan = document.getElementById('horarios-indisponiveis');
    
    // Limpa options existentes (mantém o primeiro)
    while (selectHorario.options.length > 1) {
        selectHorario.remove(1);
    }
    
    let totalDisponiveis = 0;
    let totalIndisponiveis = 0;
    
    // Adiciona os horários
    horariosDisponiveis.forEach(horario => {
        const option = document.createElement('option');
        option.value = horario.horario;
        option.textContent = horario.horario;
        
        if (!horario.disponivel) {
            option.disabled = true;
            option.textContent += ' (Indisponível)';
            option.style.color = '#ef4444';
            option.style.opacity = '0.6';
            totalIndisponiveis++;
        } else {
            totalDisponiveis++;
        }
        
        selectHorario.appendChild(option);
    });
    
    // Atualiza informações
    if (totalDisponiveis > 0 || totalIndisponiveis > 0) {
        infoDiv.classList.remove('hidden');
        disponiveisSpan.textContent = `✅ ${totalDisponiveis} disponíveis`;
        indisponiveisSpan.textContent = `❌ ${totalIndisponiveis} indisponíveis`;
    } else {
        infoDiv.classList.add('hidden');
    }
}

// SOLUÇÃO ALTERNATIVA: Usar horários fixos + validação no submit
function inicializarHorariosFixos() {
    const selectHorario = document.getElementById('horario');
    
    // Horários fixos das 08:00 às 18:00, de 30 em 30 minutos
    for (let hora = 8; hora <= 18; hora++) {
        for (let minuto = 0; minuto < 60; minuto += 30) {
            const horario = `${hora.toString().padStart(2, '0')}:${minuto.toString().padStart(2, '0')}`;
            const option = document.createElement('option');
            option.value = horario;
            option.textContent = horario;
            option.setAttribute('data-disponivel', 'true');
            selectHorario.appendChild(option);
        }
    }
}

// Event listener para quando a data mudar
document.getElementById('data').addEventListener('change', async function() {
    const dataSelecionada = this.value;
    const selectHorario = document.getElementById('horario');
    
    if (!dataSelecionada) {
        // Reseta para estado inicial
        selectHorario.innerHTML = '<option value="">Selecione um horário</option>';
        document.getElementById('horarios-info').classList.add('hidden');
        inicializarHorariosFixos();
        return;
    }
    
    // Mostra loading
    selectHorario.disabled = true;
    selectHorario.innerHTML = '<option value="">Carregando horários...</option>';
    
    try {
        // Tenta carregar horários ocupados
        const horariosOcupados = await carregarHorariosOcupados(dataSelecionada);
        const horariosDisponiveis = gerarHorariosDisponiveis(horariosOcupados);
        
        // Atualiza o select
        atualizarSelectHorarios(horariosDisponiveis);
    } catch (error) {
        // Se falhar, usa horários fixos
        console.log('Usando horários fixos devido a erro na API');
        selectHorario.innerHTML = '<option value="">Selecione um horário</option>';
        inicializarHorariosFixos();
        document.getElementById('horarios-info').classList.add('hidden');
    }
    
    selectHorario.disabled = false;
    feather.replace();
});

// Validação adicional no submit
document.getElementById('agendarForm').addEventListener('submit', function(e) {
    const horarioSelect = document.getElementById('horario');
    const horarioSelecionado = horarioSelect.options[horarioSelect.selectedIndex];
    
    if (horarioSelecionado.disabled) {
        e.preventDefault();
        alert('Este horário está indisponível. Por favor, selecione outro horário.');
        horarioSelect.focus();
    }
});

// Inicialização
document.addEventListener('DOMContentLoaded', function() {
    if (user_id) {
        inicializarHorariosFixos();
    }
    feather.replace();
});
        // Pega user_id da URL
        const urlParams = new URLSearchParams(window.location.search);
        const user_id = urlParams.get('user_id');

        // Verifica se o link é válido
        if (!user_id) {
            document.getElementById('agendarForm').style.display = 'none';
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('resultado').innerHTML = `
                <div class="p-4 rounded-lg error-message">
                    <i data-feather="alert-triangle" class="w-8 h-8 mx-auto mb-3"></i>
                    <h3 class="text-xl font-semibold mb-2">Link Inválido</h3>
                    <p>Este link de agendamento é inválido ou expirado.</p>
                    <p class="text-sm opacity-80 mt-2">Entre em contato com quem enviou este link.</p>
                </div>
            `;
            feather.replace();
        }

        // Máscara para telefone
        const phoneMask = IMask(document.getElementById('telefone'), {
            mask: '(00) 00000-0000'
        });

        // Define data mínima como hoje
        document.getElementById('data').min = new Date().toISOString().split('T')[0];

        // Submit do formulário
        document.getElementById('agendarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.querySelector('#agendarForm button[type="submit"]');
            const agendarText = document.getElementById('agendarText');
            const agendarSpinner = document.getElementById('agendarSpinner');
            
            // Mostra loading
            agendarText.textContent = 'Agendando...';
            agendarSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            const agendamento = {
    nome: document.getElementById('nome').value,
    email: document.getElementById('email').value, // Agora é opcional
    telefone: document.getElementById('telefone').value,
    data: document.getElementById('data').value,
    horario: document.getElementById('horario').value,
    user_id: user_id
};

            try {
                const response = await fetch('https://agendamento-ynxr.onrender.com/agendamento-publico', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(agendamento)
                });

                const result = await response.json();
                
                // Mostra resultado
                document.getElementById('resultado').style.display = 'block';
                
                if (result.success) {
                    document.getElementById('resultado').innerHTML = `
                        <div class="p-6 rounded-lg success-message">
                            <i data-feather="check-circle" class="w-12 h-12 mx-auto mb-4"></i>
                            <h3 class="text-xl font-semibold mb-2">Agendamento Confirmado!</h3>
                            <p class="mb-4">${result.msg}</p>
                            <div class="bg-white/10 rounded-lg p-4 text-left">
                                <p><strong>Nome:</strong> ${agendamento.nome}</p>
                                <p><strong>Data:</strong> ${agendamento.data}</p>
                                <p><strong>Horário:</strong> ${agendamento.horario}</p>
                            </div>
                        </div>
                    `;
                    document.getElementById('agendarForm').reset();
                } else {
                    document.getElementById('resultado').innerHTML = `
                        <div class="p-6 rounded-lg error-message">
                            <i data-feather="alert-circle" class="w-12 h-12 mx-auto mb-4"></i>
                            <h3 class="text-xl font-semibold mb-2">Erro no Agendamento</h3>
                            <p>${result.msg}</p>
                        </div>
                    `;
                }
                
                feather.replace();
                
            } catch (error) {
                document.getElementById('resultado').style.display = 'block';
                document.getElementById('resultado').innerHTML = `
                    <div class="p-6 rounded-lg error-message">
                        <i data-feather="wifi-off" class="w-12 h-12 mx-auto mb-4"></i>
                        <h3 class="text-xl font-semibold mb-2">Erro de Conexão</h3>
                        <p>Erro ao agendar. Verifique sua conexão e tente novamente.</p>
                    </div>
                `;
                feather.replace();
            } finally {
                // Restaura botão
                agendarText.textContent = 'Agendar Compromisso';
                agendarSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        // Animações para os campos
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('ring-2', 'ring-indigo-500/30');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('ring-2', 'ring-indigo-500/30');
            });
        });
    </script>
