    <style>

<body>
    <div class="container">
        <h1>📅 Agendar Compromisso</h1>
        
        <div id="loading" class="loading">🔄 Carregando seus dados...</div>
        
        <div id="error-message" class="error" style="display: none;"></div>
        <div id="success-message" class="success" style="display: none;"></div>
        <div id="info-message" class="info" style="display: none;"></div>
        
        <form id="agendamento-form" style="display: none;">
            <div id="empresa-info" style="margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 5px;"></div>
            
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email">
            </div>
            
            <div class="form-group">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" required>
            </div>
            
            <!-- 🎯 NOVO: Cliente ESCOLHE data -->
            <div class="form-group">
                <label for="data">Escolha a Data:</label>
                <input type="date" id="data" required min="<?= date('Y-m-d') ?>">
            </div>
            
            <!-- 🎯 NOVO: Cliente ESCOLHE horário -->
            <div class="form-group">
                <label for="horario">Escolha o Horário:</label>
                <select id="horario" required disabled>
                    <option value="">Primeiro selecione uma data</option>
                </select>
                <div id="loading-horarios" style="display: none; color: #666; font-size: 12px; margin-top: 5px;">
                    🔄 Buscando horários disponíveis...
                </div>
            </div>
            
            <button type="submit" id="submit-btn">✅ Confirmar Agendamento</button>
        </form>
    </div>

    <script>
        const BACKEND_URL = 'https://agendamento-ynxr.onrender.com';
        
        // ✅ DETECTA PARÂMETROS DA URL
        function getUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            let username = urlParams.get('username');
            let token = urlParams.get('token');
            
            // Também tenta na hash para compatibilidade
            if (!username || !token) {
                const hash = window.location.hash.substring(1);
                const parts = hash.split('/');
                if (parts.length >= 2) {
                    username = parts[0];
                    token = parts[1];
                }
            }
            
            console.log('🔧 Parâmetros detectados:', { username, token });
            return { username, token };
        }
        
        // ✅ CARREGA DADOS DO LINK (apenas informações prévias)
        async function carregarDadosLink() {
            const { username, token } = getUrlParams();
            
            if (!username || !token) {
                mostrarErro('Link inválido. Verifique se o link está completo.');
                document.getElementById('loading').style.display = 'none';
                return;
            }
            
            try {
                console.log('🔄 Buscando dados do link...', { username, token });
                
                const response = await fetch(`${BACKEND_URL}/api/agendar-convidado/${username}/${token}`);
                const data = await response.json();
                
                console.log('📦 Resposta do backend:', data);
                
                if (!response.ok) {
                    throw new Error(data.msg || 'Erro ao carregar dados do link');
                }
                
                if (data.success) {
                    preencherInformacoesPrevias(data.dados_predefinidos, data.personalizacao);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('agendamento-form').style.display = 'block';
                    
                    // Configurar evento para buscar horários quando data for selecionada
                    document.getElementById('data').addEventListener('change', function() {
                        buscarHorariosDisponiveis(username, this.value);
                    });
                    
                } else {
                    throw new Error(data.msg || 'Dados do link não encontrados');
                }
                
            } catch (error) {
                console.error('❌ Erro:', error);
                mostrarErro(error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // ✅ PREENCHE INFORMAÇÕES PRÉVIAS (nome, email, telefone)
        function preencherInformacoesPrevias(dados, personalizacao = {}) {
            document.getElementById('nome').value = dados.nome || '';
            document.getElementById('email').value = dados.email || '';
            document.getElementById('telefone').value = dados.telefone || '';
            
            // Mostra info da empresa se disponível
            if (personalizacao.nome_empresa) {
                document.getElementById('empresa-info').innerHTML = `
                    <strong>Agendamento com:</strong> ${personalizacao.nome_empresa}
                `;
            }
            
            // Configura data mínima como hoje
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('data').min = hoje;
        }
        
        // ✅ BUSCA HORÁRIOS DISPONÍVEIS
        async function buscarHorariosDisponiveis(username, data) {
            const horarioSelect = document.getElementById('horario');
            const loadingDiv = document.getElementById('loading-horarios');
            const submitBtn = document.getElementById('submit-btn');
            
            if (!data) {
                horarioSelect.innerHTML = '<option value="">Primeiro selecione uma data</option>';
                horarioSelect.disabled = true;
                submitBtn.disabled = true;
                return;
            }
            
            try {
                horarioSelect.disabled = true;
                submitBtn.disabled = true;
                loadingDiv.style.display = 'block';
                horarioSelect.innerHTML = '<option value="">Buscando horários...</option>';
                
                console.log('🔄 Buscando horários para:', { username, data });
                
                const response = await fetch(`${BACKEND_URL}/api/horarios-disponiveis/${username}?data=${data}`);
                const result = await response.json();
                
                console.log('📦 Horários disponíveis:', result);
                
                if (!response.ok) {
                    throw new Error(result.msg || 'Erro ao buscar horários');
                }
                
                if (result.success) {
                    preencherHorariosDisponiveis(result.horarios_disponiveis);
                } else {
                    throw new Error(result.msg || 'Erro ao carregar horários');
                }
                
            } catch (error) {
                console.error('❌ Erro ao buscar horários:', error);
                horarioSelect.innerHTML = '<option value="">Erro ao carregar horários</option>';
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
        
        // ✅ PREENCHE SELECT COM HORÁRIOS DISPONÍVEIS
        function preencherHorariosDisponiveis(horariosDisponiveis) {
            const horarioSelect = document.getElementById('horario');
            const submitBtn = document.getElementById('submit-btn');
            
            if (horariosDisponiveis.length === 0) {
                horarioSelect.innerHTML = '<option value="">Nenhum horário disponível nesta data</option>';
                horarioSelect.disabled = true;
                submitBtn.disabled = true;
                return;
            }
            
            horarioSelect.innerHTML = '<option value="">Selecione um horário</option>';
            
            horariosDisponiveis.forEach(horario => {
                const option = document.createElement('option');
                option.value = horario;
                option.textContent = horario;
                horarioSelect.appendChild(option);
            });
            
            horarioSelect.disabled = false;
            submitBtn.disabled = false;
        }
        
        function mostrarErro(mensagem) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = mensagem;
            errorDiv.style.display = 'block';
        }
        
        function mostrarSucesso(mensagem) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = mensagem;
            successDiv.style.display = 'block';
        }
        
        function mostrarInfo(mensagem) {
            const infoDiv = document.getElementById('info-message');
            infoDiv.textContent = mensagem;
            infoDiv.style.display = 'block';
        }
        
       // ✅ ADICIONE ISSO NO agendar.html - dentro da função de submit
document.getElementById('agendamento-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const { token } = getUrlParams();
    const data = document.getElementById('data').value;
    const horario = document.getElementById('horario').value;
    
    if (!data || !horario) {
        mostrarErro('Por favor, selecione uma data e horário.');
        return;
    }
    
    const dadosAgendamento = {
        token: token,
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        data: data,
        horario: horario
    };
    
    try {
        console.log('🔄 Confirmando agendamento...', dadosAgendamento);
        
        // Desabilitar botão
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = '🔄 Confirmando...';
        
        const response = await fetch(`${BACKEND_URL}/api/confirmar-agendamento-link`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(dadosAgendamento)
        });
        
        const data = await response.json();
        console.log('📦 Resposta da confirmação:', data);
        
        if (data.success) {
            mostrarSucesso('✅ ' + data.msg);
            document.getElementById('agendamento-form').style.display = 'none';
            
            // Mostra detalhes do agendamento
            if (data.agendamento) {
                mostrarInfo(`
                    📅 Agendamento confirmado!<br>
                    <strong>Data:</strong> ${formatarData(data.agendamento.data)}<br>
                    <strong>Horário:</strong> ${data.agendamento.horario}<br>
                    <strong>Profissional:</strong> ${document.getElementById('empresa-info').textContent || ''}
                `);
            }
            
            // 🔥🔥🔥 SOLUÇÃO: AVISA A PÁGINA PRINCIPAL
            setTimeout(() => {
                try {
                    // Tenta avisar a janela/aba do profissional
                    if (window.opener) {
                        // Se abriu em nova janela
                        window.opener.postMessage({ 
                            type: 'AGENDAMENTO_CONFIRMADO',
                            agendamento: data.agendamento 
                        }, '*');
                    }
                    
                    // Tenta avisar através do localStorage
                    localStorage.setItem('ultimo_agendamento', Date.now().toString());
                    
                    console.log('📢 Aviso enviado para página principal');
                } catch (error) {
                    console.log('⚠️ Não foi possível avisar a página principal');
                }
            }, 1000);
            
        } else {
            throw new Error(data.msg || 'Erro ao confirmar agendamento');
        }
        
    } catch (error) {
        console.error('❌ Erro ao confirmar:', error);
        mostrarErro(error.message);
        
        // Reabilitar botão em caso de erro
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = false;
        submitBtn.textContent = '✅ Confirmar Agendamento';
    }
});
        
        function formatarData(dataISO) {
            const data = new Date(dataISO + 'T00:00:00');
            return data.toLocaleDateString('pt-BR');
        }
        
        // ✅ INICIALIZAÇÃO
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Página de agendamento carregada');
            console.log('📍 URL atual:', window.location.href);
            carregarDadosLink();
        });
    </script>
</body>
