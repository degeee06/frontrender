<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Compromisso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    body {
        font-family: 'Inter', sans-serif;
    }
  
    .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .input-field {
        transition: all 0.3s ease;
        font-size: 16px; /* 🔥 EVITA ZOOM NO iOS */
    }
    
    .input-field:focus {
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
    }
    
    .loading-spinner {

        border-radius: 50%;
        border-top: 2px solid white;
        width: 20px;
        height: 20px;

    }

        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }

    /* 🔥 CORREÇÕES MOBILE CRÍTICAS */

        .container {
            padding-left: 12px;

        }

        }
        
        .input-field {
            font-size: 16px !important;
            padding-top: 14px !important;
            padding-bottom: 14px !important;
        }
        
        .mobile-w-full {
            width: 100%;
        }
        
        .mobile-flex-col {
            flex-direction: column;
        }

    .success-message {
        background: rgba(34, 197, 94, 0.2);
        border: 1px solid rgba(34, 197, 94, 0.5);
        color: #4ade80;
    }

    .error-message {
        background: rgba(239, 68, 68, 0.2);
        border: 1px solid rgba(239, 68, 68, 0.5);
        color: #f87171;

        /* 🔥 CHAT FLUTUANTE NO CANTO DIREITO */
.chat-flutuante {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 350px;
    height: 450px;
    background: rgba(23, 23, 23, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.chat-header {
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    padding: 16px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-header h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
}

.chat-toggle {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    padding: 4px;
}

.chat-messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.3);
}

.chat-message {
    margin-bottom: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
}

.chat-bot {
    background: rgba(139, 92, 246, 0.3);
    border: 1px solid rgba(139, 92, 246, 0.5);
    margin-right: auto;
}

.chat-user {
    background: rgba(59, 130, 246, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.5);
    margin-left: auto;
}

.chat-message-content {
    font-size: 14px;
    line-height: 1.5;
}

.chat-actions {
    padding: 16px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.chat-btn-primary {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #10b981, #059669);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.chat-btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

/* Botão flutuante para abrir chat */
.chat-abrir-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    border: none;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.chat-abrir-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 30px rgba(99, 102, 241, 0.6);
}

/* Estados do chat */
.chat-fechado {
    transform: translateY(100px);
    opacity: 0;
    pointer-events: none;
}

.chat-aberto {
    transform: translateY(0);
    opacity: 1;
}

/* Grid de horários no chat */
.horarios-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 6px;
    margin-top: 8px;
}

.horario-btn {
    padding: 6px 8px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    font-size: 11px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
}

.horario-btn:hover {
    background: rgba(59, 130, 246, 0.3);
    border-color: rgba(59, 130, 246, 0.5);
}

.horario-btn.selecionado {
    background: rgba(34, 197, 94, 0.3);
    border-color: rgba(34, 197, 94, 0.5);
}

.info-box {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: 8px;
    padding: 10px;
    margin: 8px 0;
    font-size: 12px;
}

.dia-section {
    margin-bottom: 12px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
}

.dia-titulo {
    font-weight: 600;
    margin-bottom: 6px;
    color: #60a5fa;
    font-size: 13px;
}

/* Responsivo */
@media (max-width: 640px) {
    .chat-flutuante {
        width: calc(100vw - 40px);
        height: 70vh;
        bottom: 10px;
        right: 10px;
        left: 10px;
    }
    
    .chat-abrir-btn {
        bottom: 10px;
        right: 10px;
    }
}
        /* 🆕 ESTILOS PARA PERÍODOS BLOQUEADOS NO CHAT */
.periodo-bloqueado-info {
    background: rgba(245, 158, 11, 0.1) !important;
    border: 1px solid rgba(245, 158, 11, 0.3) !important;
    color: #fbbf24 !important;
}

.horario-bloqueado {
    background: rgba(107, 114, 128, 0.3) !important;
    border-color: rgba(107, 114, 128, 0.5) !important;
    color: #9ca3af !important;
    cursor: not-allowed !important;
}

.horario-bloqueado:hover {
    background: rgba(107, 114, 128, 0.3) !important;
    transform: none !important;
}

.grupo-horarios {
    margin-bottom: 12px;
    padding: 8px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 8px;
}

.titulo-grupo {
    font-size: 11px;
    color: #fbbf24;
    margin-bottom: 6px;
    font-weight: 600;
}
        /* 🔔 BADGE DE NOTIFICAÇÃO NO BOTÃO DO CHAT */
.chat-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 11px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 2s infinite;
    box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
    z-index: 1001;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.chat-badge.hidden {
    display: none;
}
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-800 to-slate-900 text-white">
    <!-- 🎯 CONTEÚDO PRINCIPAL 🎯 -->
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <!-- Header -->
        <header class="text-center mb-8" data-aos="fade-down">
            <div class="flex justify-center mb-3">

                </h1>
            </div>
            <p class="text-lg opacity-90">

            </p>

<!-- 🔥 BOTÃO CORRIGIDO - CHAT FLUTUANTE NO CANTO DIREITO -->
<button class="chat-abrir-btn" id="chatAbrirBtn">
    <i data-feather="message-circle"></i>
    <div id="chatBadge" class="chat-badge hidden">!</div>
</button>

<div id="chatFlutuante" class="chat-flutuante chat-fechado">
    <!-- Cabeçalho do Chat -->
    <div class="chat-header">
        <h3>💬 Assistente de Agendamento</h3>

    <!-- Mensagens do Chat -->

    </div>
    
    <!-- Ações do Chat -->

</div>

                <!-- Email (OPCIONAL) -->
<div>

                            <input type="date" id="data" placeholder="Data do Agendamento" required 
                                   class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 focus:outline-none input-field">

                        <label for="horario" class="block mb-2 text-sm font-medium opacity-80">Horário</label>

                                <i data-feather="clock" class="w-5 h-5 text-gray-400"></i>
                            </div>
<input type="time" id="horario" placeholder="Horário" required 
       class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 focus:outline-none input-field">
                        </div>

                <!-- Botão Agendar -->
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-cyan-500 text-white py-3 px-6 rounded-lg font-medium hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-lg mt-4">
                    <i data-feather="plus" class="w-5 h-5"></i>

        <!-- Resultado -->
        <div id="resultado" class="glass-card rounded-2xl p-6 text-center" data-aos="fade-up" style="display: none;">

    <script>
        // Inicializa Feather Icons
        feather.replace();
        // 🔥 CONFIGURA EVENT LISTENERS DO CHAT (ADICIONE ISSO)
document.getElementById('chatAbrirBtn').addEventListener('click', toggleChat);
document.getElementById('chatFecharBtn').addEventListener('click', toggleChat);
document.getElementById('carregarHorariosBtn').addEventListener('click', carregarHorariosReais);
        // Inicializa AOS
        AOS.init({
            duration: 800,
            once: true
        });

       // Pega user_id E timestamp da URL
const urlParams = new URLSearchParams(window.location.search);
const user_id = urlParams.get('user_id');
const t = urlParams.get('t'); // 🆕 PEGA TIMESTAMP

// Verifica se o link é válido (agora verifica ambos)
if (!user_id || !t) {
    document.getElementById('agendarForm').style.display = 'none';
    document.getElementById('resultado').style.display = 'block';
    document.getElementById('resultado').innerHTML = `
        <div class="p-4 rounded-lg error-message">
            <i data-feather="alert-triangle" class="w-8 h-8 mx-auto mb-3"></i>
            <h3 class="text-xl font-semibold mb-2">Link Inválido</h3>
            <p>Este link de agendamento é inválido ou expirado.</p>
            <p class="text-sm opacity-80 mt-2">Entre em contato com quem enviou este link.</p>
        </div>
    `;
    feather.replace();
}

        // Máscara para telefone
        const phoneMask = IMask(document.getElementById('telefone'), {
            mask: '(00) 00000-0000'
        });

// 🔥 CONTROLE DO CHAT FLUTUANTE
let chatAberto = false;

function toggleChat() {
    const chat = document.getElementById('chatFlutuante');
    const botao = document.querySelector('.chat-abrir-btn');
    
    if (chatAberto) {
        chat.classList.remove('chat-aberto');
        chat.classList.add('chat-fechado');
        botao.style.display = 'flex';
    } else {
        chat.classList.remove('chat-fechado');
        chat.classList.add('chat-aberto');
        botao.style.display = 'none';
    }
    
    chatAberto = !chatAberto;
    feather.replace();
}

    // 🔔 FUNÇÕES PARA CONTROLAR A NOTIFICAÇÃO
function mostrarNotificacao() {
    const badge = document.getElementById('chatBadge');
    badge.classList.remove('hidden');
}

function esconderNotificacao() {
    const badge = document.getElementById('chatBadge');
    badge.classList.add('hidden');
}

// Mostra notificação quando o chat é fechado
function toggleChat() {
    const chat = document.getElementById('chatFlutuante');
    const botao = document.querySelector('.chat-abrir-btn');
    
    if (chatAberto) {
        chat.classList.remove('chat-aberto');
        chat.classList.add('chat-fechado');
        botao.style.display = 'flex';
        // 🔔 MOSTRA NOTIFICAÇÃO AO FECHAR
        setTimeout(mostrarNotificacao, 1000);
    } else {
        chat.classList.remove('chat-fechado');
        chat.classList.add('chat-aberto');
        botao.style.display = 'none';
        // 🔔 ESCONDE NOTIFICAÇÃO AO ABRIR
        esconderNotificacao();
    }
    
    chatAberto = !chatAberto;
    feather.replace();
}
        setTimeout(() => {
    if (!chatAberto) {
        mostrarNotificacao();
    }
}, 5000);
        
function adicionarMensagemChat(texto, tipo = 'bot') {
    const messagesDiv = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `chat-message chat-${tipo}`;
    messageDiv.innerHTML = `<div class="chat-message-content">${texto}</div>`;
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    feather.replace();
}

// 🔥 CORREÇÃO COMPLETA: Função carregarHorariosReais
async function carregarHorariosReais() {
    if (!user_id) {
        adicionarMensagemChat('<strong>Assistente:</strong> Link inválido. Não é possível verificar horários. ❌');
        return;
    }

     // ✅✅✅ ADICIONE AQUI - LOADING NO BOTÃO
    const carregarBtn = document.getElementById('carregarHorariosBtn');
    carregarBtn.innerHTML = '<div class="loading-spinner"></div> Carregando...';
    carregarBtn.disabled = true;

    adicionarMensagemChat('<strong>Assistente:</strong> Consultando horários reais do sistema... ⏳');


    try {
        // 🎯 BUSCA PERFIL REAL - COM TRATAMENTO DE ERRO MELHORADO
        let perfilInfo = null;
        try {
            console.log('🔍 Buscando perfil para user_id:', user_id);
            const perfilResponse = await fetch(`https://agendamento-ynxr.onrender.com/api/perfil-publico/${user_id}`);
            
            console.log('📡 Status da resposta:', perfilResponse.status);
            
            if (perfilResponse.ok) {
                const perfilData = await perfilResponse.json();
                console.log('📦 Dados do perfil recebidos:', perfilData);
                
                if (perfilData.success && perfilData.perfil) {
                    perfilInfo = perfilData.perfil;
                    console.log('✅ Perfil carregado com sucesso:', perfilInfo.nome_negocio);
                } else {
                    console.log('❌ Perfil não encontrado ou success=false');
                    adicionarMensagemChat('<strong>Assistente:</strong> Perfil do estabelecimento não encontrado. ❌');
                    return;
                }
            } else {
                console.log('❌ Erro HTTP:', perfilResponse.status);
                throw new Error(`HTTP ${perfilResponse.status}`);
            }
        } catch (perfilError) {
            console.error('❌ Erro ao buscar perfil:', perfilError);
            adicionarMensagemChat('<strong>Assistente:</strong> Erro ao carregar informações do estabelecimento. ❌');
            return;
        }

        // 🎯 SE CHEGOU AQUI, TEMOS PERFIL - MOSTRA INFORMAÇÕES
        adicionarMensagemChat(`<strong>Assistente:</strong> Encontrei o <strong>${perfilInfo.nome_negocio}</strong>! 🏪`);
        
        // Mostra horários de funcionamento
        let infoFuncionamento = `
            <div class="info-box">
                <strong>🕒 Horários de Funcionamento:</strong><br>
        `;
        
        Object.keys(perfilInfo.horarios_funcionamento).forEach(dia => {
            const horario = perfilInfo.horarios_funcionamento[dia];
            infoFuncionamento += `${formatarDiaNome(dia)}: ${horario.inicio} às ${horario.fim}<br>`;
        });
        
        infoFuncionamento += `</div>`;
        adicionarMensagemChat(infoFuncionamento);
        
        // 🎯 MOSTRA BLOQUEIOS SE EXISTIREM
        if (perfilInfo.horarios_bloqueados && perfilInfo.horarios_bloqueados.length > 0) {
            const bloqueiosRecorrentes = perfilInfo.horarios_bloqueados.filter(p => p.tipo === 'recorrente');
            const bloqueiosDataEspecifica = perfilInfo.horarios_bloqueados.filter(p => p.tipo === 'data_especifica');
            
            if (bloqueiosRecorrentes.length > 0) {
                adicionarMensagemChat(`
                    <div class="info-box" style="background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3);">
                        <strong>🚫 Períodos Bloqueados Fixos:</strong><br>
                        <div style="font-size: 12px; margin-top: 6px;">
                            ${bloqueiosRecorrentes.map(periodo => 
                                `• ${periodo.inicio} - ${periodo.fim}`
                            ).join('<br>')}
                        </div>
                        <div style="font-size: 11px; margin-top: 4px; color: #fbbf24;">
                            ⚠️ Estes horários não estarão disponíveis em nenhum dia
                        </div>
                    </div>
                `);
            }
            
            if (bloqueiosDataEspecifica.length > 0) {
                adicionarMensagemChat(`
                    <div class="info-box" style="background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3);">
                        <strong>📅 Bloqueios em Datas Específicas:</strong><br>
                        <div style="font-size: 12px; margin-top: 6px;">
                            Existem ${bloqueiosDataEspecifica.length} períodos bloqueados em datas específicas
                        </div>
                        <div style="font-size: 11px; margin-top: 4px; color: #60a5fa;">
                            📍 Estes bloqueios aparecerão apenas nas datas correspondentes
                        </div>
                    </div>
                `);
            }
        } else {
            adicionarMensagemChat(`
                <div class="info-box" style="background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.3);">
                    <strong>✅ Sem bloqueios:</strong> Todos os horários estão disponíveis!
                </div>

        const estaOcupado = horariosOcupados.some(ocupado => {
            const ocupadoParaComparar = ocupado.length === 8 ? ocupado.substring(0, 5) : ocupado;
            return ocupadoParaComparar === horarioParaComparar;

        // 🆕 FUNÇÃO: Agrupa horários considerando períodos bloqueados
function agruparHorariosPorPeriodo(horariosDisponiveis, periodosBloqueados) {
    if (!periodosBloqueados || periodosBloqueados.length === 0) {
        // Se não há períodos bloqueados, retorna um único grupo
        return [{ horarios: horariosDisponiveis }];
    }
    
    const grupos = [];
    let horariosRestantes = [...horariosDisponiveis];
    
    // Ordena períodos bloqueados por horário de início
    const periodosOrdenados = [...periodosBloqueados].sort((a, b) => a.inicio.localeCompare(b.inicio));
    
    // Para cada período bloqueado, cria grupos antes/depois
    periodosOrdenados.forEach((periodo, index) => {
        const periodoAnterior = index > 0 ? periodosOrdenados[index - 1] : null;
        const periodoPosterior = periodo;
        
        // Horários antes do período bloqueado atual
        const horariosAntes = horariosRestantes.filter(horario => horario < periodo.inicio);
        
        if (horariosAntes.length > 0) {
            grupos.push({
                horarios: horariosAntes,
                periodoAnterior: periodoAnterior,
                periodoPosterior: periodoPosterior
            });
            
            // Remove esses horários dos restantes
            horariosRestantes = horariosRestantes.filter(horario => horario >= periodo.inicio);
        }
        
        // Remove horários que estão dentro do período bloqueado
        horariosRestantes = horariosRestantes.filter(horario => 
            horario < periodo.inicio || horario >= periodo.fim
        );
    });
    
    // Adiciona horários restantes (após o último período bloqueado)
    if (horariosRestantes.length > 0) {
        grupos.push({
            horarios: horariosRestantes,
            periodoAnterior: periodosOrdenados[periodosOrdenados.length - 1],
            periodoPosterior: null
        });
    }
    
    return grupos;
}
        
// 🆕 FUNÇÃO: Filtra apenas horas cheias (00 minutos)
function filtrarHorasCheias(horarios) {
    return horarios.filter(horario => {
        const minutos = horario.split(':')[1];
        // ✅ Permite apenas: 00 minutos (horas cheias)
        return minutos === '00';
    });
}
        
// 🔥 SUBSTITUIR: Função corrigida que usa APENAS HORAS CHEIAS
async function gerarHorariosBasePerfil(dataSelecionada) {
    try {
        const perfilResponse = await fetch(`https://agendamento-ynxr.onrender.com/api/perfil-publico/${user_id}`);
        
        if (perfilResponse.ok) {
            const perfilData = await perfilResponse.json();
            if (perfilData.success && perfilData.perfil) {
                const perfilInfo = perfilData.perfil;
                const diaSemana = new Date(dataSelecionada).getDay();
                const nomeDia = obterDiaSemana(diaSemana).toLowerCase();
                
                if (perfilInfo.horarios_funcionamento && perfilInfo.horarios_funcionamento[nomeDia]) {
                    const horarioDia = perfilInfo.horarios_funcionamento[nomeDia];
                    
                    // Gera horários com intervalo de 30 minutos (para ter mais opções)
                    const todosHorarios = gerarHorariosIntervalo(
                        horarioDia.inicio, 
                        horarioDia.fim,
                        30 // Gera de 30 em 30 minutos
                    );
                    
                    // 🆕 FILTRA APENAS HORAS CHEIAS (00 minutos)
                    const horasCheias = filtrarHorasCheias(todosHorarios);
                    
                    console.log(`🕒 Horários para ${nomeDia}:`, {
                        todos: todosHorarios,
                        horas_cheias: horasCheias
                    });
                    
                    // 🆕 FILTRA HORÁRIOS BLOQUEADOS
                    let horariosDisponiveis = [...horasCheias];
                    
                    if (perfilInfo.horarios_bloqueados && perfilInfo.horarios_bloqueados.length > 0) {
                        horariosDisponiveis = horariosDisponiveis.filter(horario => {
                            const horarioCompleto = `${dataSelecionada}T${horario}`;
                            const dataHorario = new Date(horarioCompleto);
                            
                            for (const periodo of perfilInfo.horarios_bloqueados) {
                                const inicioPeriodo = new Date(`${dataSelecionada}T${periodo.inicio}`);
                                const fimPeriodo = new Date(`${dataSelecionada}T${periodo.fim}`);
                                
                                if (dataHorario >= inicioPeriodo && dataHorario < fimPeriodo) {
                                    return false; // Horário bloqueado
                                }
                            }
                            return true; // Horário disponível
                        });
                    }
                    
                    mostrarHorariosDisponiveis(
                        dataSelecionada, 
                        horariosDisponiveis, 
                        [], // Não temos info de ocupados no fallback
                        perfilInfo.horarios_bloqueados || []
                    );
                    return;
                }
            }
        }
        
        // 🔥 CORREÇÃO: Fallback com APENAS HORAS CHEIAS
        const todosHorarios = gerarHorariosIntervalo('09:00', '16:00', 30);
        const horasCheias = filtrarHorasCheias(todosHorarios);
        mostrarHorariosDisponiveis(dataSelecionada, horasCheias);
        
    } catch (error) {
        console.error('Erro no fallback:', error);
        const todosHorarios = gerarHorariosIntervalo('09:00', '16:00', 30);
        const horasCheias = filtrarHorasCheias(todosHorarios);
        mostrarHorariosDisponiveis(dataSelecionada, horasCheias);
    }
}
        
     

// 🔥 ATUALIZAR: Função gerarHorariosIntervalo corrigida
function gerarHorariosIntervalo(inicio, fim, intervaloMinutos) {
    const horarios = [];
    const [horaInicio, minutoInicio] = inicio.split(':').map(Number);
    const [horaFim, minutoFim] = fim.split(':').map(Number);
    
    let horaAtual = horaInicio;
    let minutoAtual = minutoInicio;
    
    // 🔥 CORREÇÃO: Para ANTES de chegar no horário de fim
    while (horaAtual < horaFim || (horaAtual === horaFim && minutoAtual < minutoFim)) {
        const horario = `${horaAtual.toString().padStart(2, '0')}:${minutoAtual.toString().padStart(2, '0')}`;
        horarios.push(horario);
        
        // Adiciona intervalo
        minutoAtual += intervaloMinutos;
        if (minutoAtual >= 60) {
            horaAtual += Math.floor(minutoAtual / 60);
            minutoAtual = minutoAtual % 60;
        }
        
        // 🔥 CORREÇÃO CRÍTICA: Para se passar do horário de fim
        if (horaAtual > horaFim || (horaAtual === horaFim && minutoAtual >= minutoFim)) {
            break;
        }
    }
    
    console.log(`📅 Horários gerados: ${inicio} - ${fim} =>`, horarios);
    return horarios;
}

// 🔥 FUNÇÃO PARA CORRIGIR FUSO HORÁRIO
function corrigirFusoHorario(dataString) {
    // Cria a data no horário UTC para evitar problemas de fuso
    const data = new Date(dataString + 'T00:00:00Z');
    
    // Formata de volta para YYYY-MM-DD sem ajuste de fuso
    const ano = data.getUTCFullYear();
    const mes = String(data.getUTCMonth() + 1).padStart(2, '0');
    const dia = String(data.getUTCDate()).padStart(2, '0');
    
    return `${ano}-${mes}-${dia}`;
}
        
// 🔥 FUNÇÕES AUXILIARES (ATUALIZADAS)
function formatarDiaNome(dia) {
    const dias = {
        'segunda': 'Segunda',
        'terca': 'Terça', 
        'quarta': 'Quarta',
        'quinta': 'Quinta',
        'sexta': 'Sexta',
        'sabado': 'Sábado',
        'domingo': 'Domingo'
    };
    return dias[dia] || dia;
}

function formatarData(dataString) {
    // 🔥 CORREÇÃO: Usa UTC para evitar problemas de fuso
    const data = new Date(dataString + 'T00:00:00Z');
    return data.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
}

    const dias = ['domingo', 'segunda', 'terca', 'quarta', 'quinta', 'sexta', 'sabado'];
    return dias[diaNumero];
}

                <i data-feather="clock" class="w-12 h-12 mx-auto mb-4"></i>
                <h3 class="text-xl font-semibold mb-2">Data Inválida</h3>
                <p>Não é possível agendar no passado.</p>
            </div>
        `;
        feather.replace();
        
        // Restaura botão
        agendarText.textContent = 'Agendar Compromisso';
        agendarSpinner.classList.add('hidden');
        submitBtn.disabled = false;
        return; // Para a execução
    }
            
// 🔥 CORRIJA A VERIFICAÇÃO (usa 'email' minúsculo):
if(!agendamento.email || agendamento.email.trim() === '') {
    agendamento.email = 'Não informado'; // ✅ 'email' minúsculo
}
            try {
                const response = await fetch('https://agendamento-ynxr.onrender.com/agendamento-publico', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(agendamento)
                });

                const result = await response.json();
                
                // Mostra resultado
                document.getElementById('resultado').style.display = 'block';
                
                if (result.success) {
                   document.getElementById('resultado').innerHTML = `
    <div class="p-6 rounded-lg success-message">
        <i data-feather="check-circle" class="w-12 h-12 mx-auto mb-4"></i>
        <h3 class="text-xl font-semibold mb-2">Agendamento Confirmado!</h3>
        <p class="mb-4">${result.msg}</p>
        <div class="bg-white/10 rounded-lg p-4 text-left">
            <p><strong>Nome:</strong> ${agendamento.nome}</p>
            <p><strong>Telefone:</strong> ${agendamento.telefone}</p>
            <p><strong>Data:</strong> ${agendamento.data}</p>
            <p><strong>Horário:</strong> ${agendamento.horario}</p>
        </div>
    </div>
`;
                    document.getElementById('agendarForm').reset();
                } else {
    // 🔥 TRATAMENTO DE ERRO MELHORADO
    let mensagemErro = result.msg || "Erro ao agendar";
    
    if (response.status === 400) {
        if (mensagemErro.includes("Horário indisponível")) {
            mensagemErro = "❌ " + mensagemErro;
        } else if (mensagemErro.includes("Fora do horário")) {
            mensagemErro = "🕒 " + mensagemErro;
        } else if (mensagemErro.includes("bloqueado")) {
            mensagemErro = "🚫 " + mensagemErro;
        } else if (mensagemErro.includes("passado")) {
            mensagemErro = "⏰ " + mensagemErro;
        } else if (mensagemErro.includes("expirado")) {
            mensagemErro = "🔗 " + mensagemErro;
        }
    }
    
    document.getElementById('resultado').innerHTML = `
        <div class="p-6 rounded-lg error-message">
            <i data-feather="alert-circle" class="w-12 h-12 mx-auto mb-4"></i>
            <h3 class="text-xl font-semibold mb-2">${response.status === 400 ? 'Dados Inválidos' : 'Erro no Agendamento'}</h3>
            <p>${mensagemErro}</p>
        </div>
    `;
}
                
                feather.replace();
                
            } catch (error) {
                document.getElementById('resultado').style.display = 'block';
                document.getElementById('resultado').innerHTML = `
                    <div class="p-6 rounded-lg error-message">
                        <i data-feather="wifi-off" class="w-12 h-12 mx-auto mb-4"></i>
                        <h3 class="text-xl font-semibold mb-2">Erro de Conexão</h3>
                        <p>Erro ao agendar. Verifique sua conexão e tente novamente.</p>
                    </div>
                `;
                feather.replace();
            } finally {
                // Restaura botão
                agendarText.textContent = 'Agendar Compromisso';
                agendarSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        // Animações para os campos
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('ring-2', 'ring-indigo-500/30');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('ring-2', 'ring-indigo-500/30');
            });
        });
    </script>
</body>
</html>
