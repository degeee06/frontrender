<!DOCTYPE html>
<html>
<head>
    <title>Autenticando no Oubook...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Autenticando...</h2>
        <p>Redirecionando de volta para o app</p>
    </div>

    <script>
    // 🔥 REDIRECIONAMENTO INTELIGENTE PARA O APP
    function redirectToApp() {
        console.log('URL atual:', window.location.href);
        
        // Se tem hash (token), redireciona para o app
        if (window.location.hash) {
            // Tenta abrir o app usando o scheme customizado
            const appUrl = `com.oubook.agendamento://auth-callback${window.location.hash}`;
            window.location.href = appUrl;
            
            // 🔥 AGORA USA A NOVA FUNÇÃO PARA FECHAR
            setTimeout(() => {
                console.log('Fechando janela...');
                fecharBrowserCapacitor();
            }, 3000);
        } else {
            // Se não tem token, fecha imediatamente
            fecharBrowserCapacitor();
        }
    }

    // 🔥🔥🔥 FUNÇÃO CORRIGIDA PARA FECHAR NO CAPACITOR
    async function fecharBrowserCapacitor() {
        console.log('🎯 Tentando fechar browser...');
        
        // PRIMEIRO: Tenta fechar com Capacitor Browser API
        if (window.Capacitor && window.Capacitor.Plugins?.Browser) {
            try {
                console.log('✅ Usando Capacitor Browser.close()');
                await window.Capacitor.Plugins.Browser.close();
                console.log('✅ Browser fechado via Capacitor!');
                return;
            } catch (error) {
                console.log('❌ Capacitor Browser.close() falhou:', error);
            }
        }
        
        // SEGUNDO: Fallback para window.close()
        console.log('🔄 Tentando window.close()...');
        try {
            window.close();
            console.log('✅ Janela fechada via window.close()');
        } catch (error) {
            console.log('❌ window.close() também falhou');
            
            // TERCEIRO: Última tentativa - redireciona para blank
            console.log('🔧 Tentando redirecionar para about:blank...');
            window.location.href = 'about:blank';
        }
    }

    // 🔥🔥🔥 FUNÇÃO SIMPLIFICADA PARA FECHAR APÓS LOGIN
    function fecharAposLogin() {
        console.log('✅ Login detectado - fechando em 1 segundo...');
        
        // 🔥 FECHA APÓS 1 SEGUNDO (MAIS RÁPIDO)
        setTimeout(() => {
            fecharBrowserCapacitor();
        }, 1000);
        
        // 🔥 BACKUP: Fecha após 3 segundos
        setTimeout(() => {
            console.log('🔄 Backup: Fechando novamente...');
            fecharBrowserCapacitor();
        }, 3000);
    }

    // Executa quando a página carrega
    document.addEventListener('DOMContentLoaded', redirectToApp);
    
    // Também tenta se a página já estiver carregada
    if (document.readyState === 'complete') {
        redirectToApp();
    }

    // 🔥 EXECUTA QUANDO DETECTA QUE O LOGIN FOI BEM-SUCEDIDO
    if (window.location.hash && window.location.hash.includes('access_token')) {
        console.log('🎯 Token de acesso detectado - login bem-sucedido!');
        fecharAposLogin();
    } else {
        console.log('⚠️ Token não encontrado - fechando mesmo assim');
        // Fecha mesmo sem token (caso de erro)
        setTimeout(() => {
            fecharBrowserCapacitor();
        }, 3000);
    }
</script>
</body>
</html>
