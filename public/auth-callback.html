<!DOCTYPE html>
<html>
<head>
    <title>Autenticando no Oubook...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Autenticando...</h2>
        <p>Redirecionando de volta para o app</p>
    </div>

   <script>
    // 🔥 CONFIGURAÇÃO DO SUPABASE (SUBSTITUA COM SUAS CREDENCIAIS REAIS)
    const SUPABASE_URL = 'https://otyxjcxxqwjotnuyrvmc.supabase.co'; // 🔥 SUBSTITUA
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk'; // 🔦 SUBSTITUA

    async function init() {
        console.log('🚀 Iniciando callback de autenticação...');
        console.log('🔍 URL completa:', window.location.href);
        console.log('🔍 Hash:', window.location.hash);
        console.log('🔍 Search:', window.location.search);
        
        // 🔥 DETECTA AMBIENTE
        const isMobileApp = !!(window.Capacitor || window.cordova);
        console.log('📱 Ambiente:', isMobileApp ? 'APP' : 'WEB');
        
        if (isMobileApp) {
            // 🔥 APP: Redireciona para scheme customizado
            handleMobileAuth();
        } else {
            // 🔥 WEB: Processa autenticação com Supabase
            await handleWebAuth();
        }
    }

    async function handleWebAuth() {
        try {
            console.log('🌐 Processando autenticação WEB...');
            
            // 🔥 INICIALIZA SUPABASE
            const { createClient } = window.supabase;
            const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // 🔥 VERIFICA SE TEM TOKENS NA URL
            const hasHash = window.location.hash.includes('access_token');
            const hasSearch = window.location.search.includes('access_token');
            
            console.log('📋 Parâmetros URL - Hash:', hasHash, 'Search:', hasSearch);
            
            if (hasHash || hasSearch) {
                console.log('✅ Tokens detectados na URL, processando...');
                
                // 🔥 DEIXA O SUPABASE PROCESSAR OS TOKENS
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    console.error('❌ Erro ao obter sessão:', error);
                } else if (session) {
                    console.log('🎉 Sessão criada com sucesso!');
                    console.log('👤 Usuário:', session.user?.email);
                    console.log('🔐 Token:', session.access_token ? '✅' : '❌');
                    
                    // 🔥 SALVA NO LOCALSTORAGE PARA CONFIRMAR
                    localStorage.setItem('supabase.auth.token', session.access_token);
                    console.log('💾 Token salvo no localStorage');
                } else {
                    console.log('⚠️ Sessão vazia, tentando fallback...');
                }
                
                // 🔥 REDIRECIONA APÓS PROCESSAR
                console.log('🔄 Redirecionando para app em 1s...');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
                
            } else {
                console.log('❌ Nenhum token encontrado na URL');
                window.location.href = '/?error=no_tokens';
            }
            
        } catch (error) {
            console.error('💥 Erro crítico:', error);
            // Fallback: redireciona mesmo com erro
            window.location.href = '/';
        }
    }

    function handleMobileAuth() {
        console.log('📱 Processando autenticação MOBILE...');
        
        if (window.location.hash || window.location.search) {
            console.log('✅ Tokens detectados, redirecionando para app...');
            const appUrl = `com.oubook.agendamento://auth-callback${window.location.hash || window.location.search}`;
            console.log('🎯 App URL:', appUrl);
            
            window.location.href = appUrl;
            
            // Tenta fechar o browser
            setTimeout(() => {
                closeBrowser();
            }, 1500);
        } else {
            console.log('❌ Nenhum token encontrado');
            closeBrowser();
        }
    }

    async function closeBrowser() {
        console.log('🎯 Tentando fechar browser...');
        
        if (window.Capacitor?.Plugins?.Browser) {
            try {
                await window.Capacitor.Plugins.Browser.close();
                console.log('✅ Browser fechado via Capacitor');
            } catch (error) {
                console.log('❌ Erro ao fechar browser:', error);
            }
        } else {
            console.log('🔧 Fallback: redirecionando para about:blank');
            window.location.href = 'about:blank';
        }
    }

    // 🔥 EXECUTA QUANDO A PÁGINA CARREGA
    document.addEventListener('DOMContentLoaded', init);
    
    // Backup se já estiver carregado
    if (document.readyState === 'complete') {
        init();
    }
</script>
</body>
</html>
