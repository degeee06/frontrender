<!DOCTYPE html>
<html>
<head>
    <title>Autenticando no Oubook...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Autenticando...</h2>
        <p>Redirecionando de volta para o app</p>
    </div>

    <script>
    // ✅ SOLUÇÃO SIMPLES E EFETIVA
    async function processarAuthCallback() {
        console.log('🔄 Processando callback OAuth...');
        
        // Verifica se está no Capacitor (app) ou navegador
        const isCapacitor = window.Capacitor !== undefined;
        
        if (isCapacitor) {
            // 🔥 ESTÁ NO APP - Fecha o browser e processa no app
            console.log('📱 No app - fechando browser...');
            
            if (window.Capacitor.Plugins?.Browser) {
                await window.Capacitor.Plugins.Browser.close();
            }
            
        } else {
            // 🔥 ESTÁ NO NAVEGADOR - Redireciona para página principal
            console.log('🌐 No navegador - redirecionando...');
            
            // Se tem tokens, redireciona para página principal
            if (window.location.hash) {
                const mainAppUrl = 'https://frontrender-iota.vercel.app/' + window.location.hash;
                window.location.href = mainAppUrl;
            } else {
                window.location.href = 'https://frontrender-iota.vercel.app/';
            }
        }
    }

    // Executa imediatamente
    document.addEventListener('DOMContentLoaded', processarAuthCallback);
    
    // Fallback se já estiver carregado
    if (document.readyState === 'complete') {
        processarAuthCallback();
    }
</script>
</body>
</html>
