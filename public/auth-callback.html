<!DOCTYPE html>
<html>
<head>
    <title>Authentication Callback</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 1rem;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Processando Login...</h2>
        <p id="status">Aguarde, estamos finalizando seu acesso.</p>
    </div>

    <script>
        // 🔥 CORREÇÃO: Use a importação correta do Supabase
        const { createClient } = supabase;
        
        const supabaseClient = createClient(
            "https://otyxjcxxqwjotnuyrvmc.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk"
        );

        async function handleCallback() {
            try {
                document.getElementById('status').textContent = 'Verificando sessão...';
                
                // 🔥 AGUARDA O SUPABASE PROCESSAR
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (error) {
                    throw error;
                }

                if (session) {
                    document.getElementById('status').textContent = 'Login realizado com sucesso! Redirecionando...';
                    
                    // 🔥 SALVA NO LOCALSTORAGE
                    localStorage.setItem('userToken', session.access_token);
                    localStorage.setItem('supabase_session', JSON.stringify(session));
                    localStorage.setItem('userEmail', session.user.email);
                    
                    // 🔥 REDIRECIONA APÓS 2 SEGUNDOS
                    setTimeout(() => {
                        window.location.href = 'https://frontrender-iota.vercel.app';
                    }, 2000);
                    
                } else {
                    document.getElementById('status').textContent = 'Sessão não encontrada. Redirecionando...';
                    setTimeout(() => {
                        window.location.href = 'https://frontrender-iota.vercel.app';
                    }, 3000);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').textContent = 'Erro: ' + error.message;
                setTimeout(() => {
                    window.location.href = 'https://frontrender-iota.vercel.app';
                }, 3000);
            }
        }

        // Inicia quando a página carrega
        document.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>
</html>
