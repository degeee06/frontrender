<!DOCTYPE html>
<html>
<head>
    <title>Authentication Callback - Oubook</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 1rem;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Login Concluído!</h2>
        <p id="status">Redirecionando para o app...</p>
        <button onclick="voltarParaApp()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: white; color: #667eea; border: none; border-radius: 0.5rem; cursor: pointer;">
            Voltar para o App Agora
        </button>
    </div>

    <script>
        const supabase = createClient(
            "https://otyxjcxxqwjotnuyrvmc.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk"
        );

        async function handleAuthCallback() {
            try {
                console.log('🔗 Processando callback de autenticação...');
                document.getElementById('status').textContent = 'Processando login...';
                
                // Aguarda um pouco para garantir que a sessão foi salva
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    console.error('❌ Erro na sessão:', error);
                    throw error;
                }

                if (session) {
                    console.log('✅ Sessão encontrada!');
                    document.getElementById('status').textContent = 'Login confirmado! Redirecionando...';
                    
                    // 🔥 REDIRECIONAMENTO AUTOMÁTICO APÓS 2 SEGUNDOS
                    setTimeout(() => {
                        voltarParaApp();
                    }, 2000);
                    
                } else {
                    console.error('❌ Nenhuma sessão encontrada');
                    document.getElementById('status').textContent = 'Sessão não encontrada. Clique no botão abaixo.';
                }
            } catch (error) {
                console.error('❌ Erro no callback:', error);
                document.getElementById('status').textContent = 'Erro no login. Clique no botão para voltar.';
            }
        }

        function voltarParaApp() {
            console.log('🔄 Voltando para o app...');
            
            // 🔥 ESTRATÉGIA SIMPLES - Vai direto para a URL do app
            window.location.href = 'https://frontrender-iota.vercel.app';
        }

        // Inicia automaticamente
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Página de callback carregada');
            handleAuthCallback();
        });
    </script>
</body>
</html>
