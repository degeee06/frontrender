<!DOCTYPE html>
<html>
<head>
    <title>Processando Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <script>
        const { createClient } = supabase;
        
        const supabaseClient = createClient(
            "https://otyxjcxxqwjotnuyrvmc.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk"
        );

        async function processarLogin() {
            try {
                console.log('🔄 Processando login no callback...');
                
                // Aguarda o Supabase processar
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (session) {
                    console.log('✅ Sessão criada no callback:', session.user.email);
                    
                    // 🔥 SALVA NO LOCALSTORAGE
                    localStorage.setItem('userToken', session.access_token);
                    localStorage.setItem('userEmail', session.user.email);
                    
                    // 🔥 REDIRECIONA DE VOLTA PARA O APP
                    if (window.history.length > 1) {
                        window.history.back(); // Volta para o app
                    } else {
                        // Fallback: abre o app via deep link
                        window.location.href = 'com.oubook.agendamento://login-success';
                    }
                } else {
                    console.log('❌ Nenhuma sessão encontrada no callback');
                    window.location.href = 'com.oubook.agendamento://login-error';
                }
            } catch (error) {
                console.error('❌ Erro no callback:', error);
                window.location.href = 'com.oubook.agendamento://login-error';
            }
        }

        document.addEventListener('DOMContentLoaded', processarLogin);
    </script>
    
    <div style="text-align: center; padding: 50px;">
        <h2>🔄 Processando Login...</h2>
        <p>Voltando para o aplicativo...</p>
    </div>
</body>
</html>
