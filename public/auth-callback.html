<!DOCTYPE html>
<html>
<head>
    <title>Processando Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <script>
        const { createClient } = supabase;
        
        const supabaseClient = createClient(
            "https://otyxjcxxqwjotnuyrvmc.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk"
        );

        async function processarLogin() {
            try {
                console.log('🔄 Processando login no callback...');
                
                // Extrai tokens da URL se existirem
                const urlParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = urlParams.get('access_token');
                const refreshToken = urlParams.get('refresh_token');
                
                if (accessToken) {
                    console.log('✅ Token encontrado na URL');
                    // Salva no localStorage para o app principal pegar
                    localStorage.setItem('userToken', accessToken);
                    localStorage.setItem('supabase_refresh_token', refreshToken);
                    localStorage.setItem('auth_source', 'callback');
                    
                    // Redireciona de volta para o app
                    window.location.href = 'com.oubook.agendamento://auth-success?token=' + accessToken;
                    return;
                }
                
                // Se não tem token na URL, verifica a sessão
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (session) {
                    console.log('✅ Sessão criada:', session.user.email);
                    
                    localStorage.setItem('userToken', session.access_token);
                    localStorage.setItem('userEmail', session.user.email);
                    localStorage.setItem('auth_source', 'callback');
                    
                    // Redireciona de volta para o app
                    window.location.href = 'com.oubook.agendamento://auth-success?token=' + session.access_token;
                } else {
                    console.log('❌ Nenhuma sessão encontrada');
                    window.location.href = 'com.oubook.agendamento://auth-error';
                }
            } catch (error) {
                console.error('❌ Erro no callback:', error);
                window.location.href = 'com.oubook.agendamento://auth-error';
            }
        }

        // Processa imediatamente ao carregar
        processarLogin();
    </script>
    
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h2>🔄 Processando Login...</h2>
        <p>Aguarde enquanto finalizamos seu acesso.</p>
    </div>
</body>
</html>
