<!DOCTYPE html>
<html>
<head>
    <title>Autenticando no Oubook...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Autenticando...</h2>
        <p>Redirecionando de volta para o app</p>
    </div>

    <script>
        // 🔥 DETECÇÃO MAIS ROBUSTA DE AMBIENTE
        function redirectToApp() {
            console.log('🔍 URL atual:', window.location.href);
            console.log('🔍 Hash:', window.location.hash);
            console.log('🔍 User Agent:', navigator.userAgent);
            
            // 🔥 DETECTA SE ESTÁ NO WEB OU APP (VERSÃO MELHORADA)
            const isWeb = !(window.Browser || window.cordova || 
                           navigator.userAgent.includes('Capacitor') ||
                           navigator.userAgent.includes('Cordova'));
            console.log('🏁 Ambiente:', isWeb ? 'WEB' : 'APP');
            
            if (window.location.hash) {
    if (isWeb) {
        // 🔥 WEB: Processa autenticação com Supabase
        console.log('🌐 Processando autenticação web...');
        // 🔥 Torna a função assíncrona e espera
        handleWebAuthentication().catch(error => {
            console.error('❌ Erro no handleWebAuthentication:', error);
            window.location.href = '/?error=auth_failed';
        });
                } else {
                    // 🔥 APP: Redireciona para o app nativo
                    console.log('📱 Redirecionando para app...');
                    const appUrl = `com.oubook.agendamento://auth-callback${window.location.hash}`;
                    console.log('🎯 App URL:', appUrl);
                    window.location.href = appUrl;
                    
                    setTimeout(() => {
                        fecharBrowserCapacitor();
                    }, 1000);
                }
            } else {
                console.log('❌ Nenhum token encontrado, fechando...');
                fecharBrowserCapacitor();
            }
        }

       // 🔥🔥🔥 FUNÇÃO CORRIGIDA PARA AUTENTICAÇÃO WEB COM SUPABASE
// 🔥🔥🔥 FUNÇÃO COMPLETA CORRIGIDA PARA WEB COM SUPABASE
async function handleWebAuthentication() {
    try {
        console.log('🔑 Iniciando autenticação web com Supabase...');
        
        // 🔥 CONFIGURAÇÃO DO SUPABASE (SUBSTITUA COM SUAS CREDENCIAIS)
        const supabaseUrl = 'https://seu-projeto.supabase.co'; // 🔥 SUBSTITUA
        const supabaseKey = 'sua-chave-publica'; // 🔥 SUBSTITUA
        
        console.log('🔧 Configurando Supabase...');
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        // 🔥 PROCESSA A SESSÃO COM SUPABASE
        console.log('🔄 Processando sessão...');
        const { data, error } = await supabase.auth.getSession();
        
        if (error) {
            console.error('❌ Erro ao processar sessão:', error);
            window.location.href = '/?error=session_error';
            return;
        }
        
        if (data.session) {
            console.log('✅ Sessão criada com sucesso!');
            console.log('👤 Usuário:', data.session.user?.email);
            console.log('🔐 Access Token:', data.session.access_token ? 'Sim' : 'Não');
        } else {
            console.log('⚠️ Nenhuma sessão encontrada, tentando fallback...');
        }
        
        // 🔥 REDIRECIONA PARA PÁGINA PRINCIPAL
        console.log('🎯 Redirecionando para página principal...');
        setTimeout(() => {
            window.location.href = '/';
        }, 1000);
        
    } catch (error) {
        console.error('❌ Erro crítico na autenticação:', error);
        // Fallback: redireciona mesmo com erro
        window.location.href = '/';
    }
}

        // 🔥🔥🔥 FUNÇÃO CORRIGIDA PARA FECHAR NO CAPACITOR
        async function fecharBrowserCapacitor() {
            console.log('🎯 Tentando fechar browser...');
            
            // PRIMEIRO: Tenta fechar com Capacitor Browser API
            if (window.Capacitor && window.Capacitor.Plugins?.Browser) {
                try {
                    console.log('✅ Usando Capacitor Browser.close()');
                    await window.Capacitor.Plugins.Browser.close();
                    console.log('✅ Browser fechado via Capacitor!');
                    return;
                } catch (error) {
                    console.log('❌ Capacitor Browser.close() falhou:', error);
                }
            }
            
            // SEGUNDO: Fallback para window.close()
            console.log('🔄 Tentando window.close()...');
            try {
                window.close();
                console.log('✅ Janela fechada via window.close()');
            } catch (error) {
                console.log('❌ window.close() também falhou');
                
                // TERCEIRO: Última tentativa - redireciona para blank
                console.log('🔧 Tentando redirecionar para about:blank...');
                window.location.href = 'about:blank';
            }
        }

        // Executa quando a página carrega
        document.addEventListener('DOMContentLoaded', redirectToApp);
        
        // Também tenta se a página já estiver carregada
        if (document.readyState === 'complete') {
            redirectToApp();
        }
    </script>
</body>
</html>
