<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Processando Login...</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 400px;
        }
        .loading {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading">⏳</div>
        <h1>Processando Login...</h1>
        <p>Por favor, aguarde enquanto finalizamos seu acesso.</p>
        <p>Esta janela fechará automaticamente.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuração do Supabase (igual ao seu app)
        const SUPABASE_URL = "https://otyxjcxxqwjotnuyrvmc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Processa o login automaticamente
        async function processarLogin() {
            try {
                console.log('🔄 Processando callback OAuth...');
                
                // O Supabase automaticamente processa o token da URL
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    console.error('❌ Erro no callback:', error);
                    return;
                }
                
                if (session) {
                    console.log('✅ Login processado com sucesso:', session.user.email);
                    
                    // Fecha a janela após sucesso
                    setTimeout(() => {
                        try {
                            window.close();
                        } catch (e) {
                            console.log('Não foi possível fechar automaticamente');
                            // Se não conseguir fechar, mostra mensagem
                            document.body.innerHTML = `
                                <div class="container">
                                    <div style="font-size: 48px;">✅</div>
                                    <h1>Login Concluído!</h1>
                                    <p>Você já pode fechar esta janela e voltar para o app.</p>
                                    <button onclick="window.close()" style="background: white; color: #667eea; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 15px;">
                                        Fechar Janela
                                    </button>
                                </div>
                            `;
                        }
                    }, 2000);
                    
                } else {
                    console.log('❌ Nenhuma sessão encontrada no callback');
                }
                
            } catch (error) {
                console.error('💥 Erro no processamento:', error);
            }
        }

        // Executa ao carregar
        document.addEventListener('DOMContentLoaded', processarLogin);
    </script>
</body>
</html>
