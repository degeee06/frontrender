<!DOCTYPE html>
<html>
<head>
    <title>Autenticando no Oubook...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Autenticando...</h2>
        <p>Redirecionando de volta para o app</p>
    </div>

    <script>
        // 🔥 REDIRECIONAMENTO INTELIGENTE PARA O APP
        function redirectToApp() {
            console.log('URL atual:', window.location.href);
            
            // Se tem hash (token), redireciona para o app
            if (window.location.hash) {
                // Tenta abrir o app usando o scheme customizado
                const appUrl = `com.oubook.agendamento://auth-callback${window.location.hash}`;
                window.location.href = appUrl;
                
                // Fallback: fecha a janela após 3 segundos
                setTimeout(() => {
                    console.log('Fechando janela...');
                    window.close();
                }, 3000);
            } else {
                // Se não tem token, fecha imediatamente
                window.close();
            }
        }

        // Executa quando a página carrega
        document.addEventListener('DOMContentLoaded', redirectToApp);
        
        // Também tenta se a página já estiver carregada
        if (document.readyState === 'complete') {
            redirectToApp();
        }
    </script>
</body>
</html>
