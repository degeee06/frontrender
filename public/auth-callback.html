<!DOCTYPE html>
<html>
<head>
    <title>Autenticando no Oubook...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Autenticando...</h2>
        <p>Redirecionando de volta para o app</p>
    </div>

    <script>
    // ✅ FECHAMENTO AGGRESSIVO PARA O CAPACITOR BROWSER
    async function fecharBrowserCompletamente() {
        console.log('🚀 Iniciando fechamento total...');
        
        // Método 1: Fechamento normal do Capacitor
        if (window.Capacitor?.Plugins?.Browser) {
            try {
                console.log('📱 Fechando via Capacitor Browser...');
                await window.Capacitor.Plugins.Browser.close();
                console.log('✅ Browser fechado com sucesso!');
                return;
            } catch (error) {
                console.log('❌ Erro no fechamento normal:', error);
            }
        }
        
        // Método 2: Tentativa de redirecionar para blank
        try {
            window.location.href = 'about:blank';
        } catch (e) {}
        
        // Método 3: Fechamento forçado
        setTimeout(() => {
            if (!window.closed) {
                console.log('🔄 Tentando window.close()...');
                window.close();
            }
        }, 500);
        
        // Método 4: Última tentativa após 2 segundos
        setTimeout(() => {
            if (!window.closed) {
                console.log('💥 Forçando fechamento...');
                // Tenta métodos extremos
                try {
                    window.open('', '_self', '');
                    window.close();
                } catch (e) {
                    // Ignora erros
                }
            }
        }, 2000);
    }

    // 🔥 EXECUTA IMEDIATAMENTE - SEM DELAY
    if (window.Capacitor) {
        console.log('🎯 Capacitor detectado - fechando browser COMPLETAMENTE');
        fecharBrowserCompletamente();
    } else {
        console.log('🌐 Navegador web - redirecionando para app...');
        // Para web normal, só redireciona
        if (window.location.hash) {
            window.location.href = 'https://frontrender-iota.vercel.app/' + window.location.hash;
        } else {
            window.location.href = 'https://frontrender-iota.vercel.app/';
        }
    }

    // 🔥 SE AINDA ESTIVER ABERTO APÓS 3 SEGUNDOS, MOSTRA BOTÃO
    setTimeout(() => {
        if (!window.closed && document.body) {
            document.body.innerHTML = `
                <div style="text-align: center; padding: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
                    <h1>✅ Login Concluído!</h1>
                    <p>Esta janela pode ser fechada.</p>
                    <button onclick="window.close()" 
                            style="padding: 12px 24px; background: white; color: #667eea; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 20px;">
                        Fechar Janela
                    </button>
                </div>
            `;
        }
    }, 3000);
</script>
</body>
</html>
