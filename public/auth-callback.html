<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login Concluído</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 400px;
        }
        .btn-app {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .auto-redirect {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Login Concluído!</h1>
        <p>Seu login foi realizado com sucesso!</p>
        
        <!-- 🔥 LINK CLICÁVEL (navegadores permitem) -->
        <a href="oubook://auth-callback" class="btn-app">
            📱 Voltar para o App
        </a>
        
        <div class="auto-redirect">
            <p>Redirecionando automaticamente em <span id="countdown">3</span> segundos...</p>
        </div>
    </div>

    <script>
        function redirectToApp() {
            // Já temos o link clicável, mas também tentamos programaticamente
            const link = document.createElement('a');
            link.href = 'oubook://auth-callback';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Fallback
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        }
        
        // Contagem regressiva
        let seconds = 3;
        const countdownElement = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(timer);
                redirectToApp();
            }
        }, 1000);
    </script>
</body>
</html>
