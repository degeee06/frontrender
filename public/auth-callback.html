<!DOCTYPE html>
<html>
<head>
    <title>Authentication Callback - Oubook</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 1rem;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Login Concluído!</h2>
        <p>Redirecionando para o app...</p>
        <button onclick="voltarParaApp()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: white; color: #667eea; border: none; border-radius: 0.5rem; cursor: pointer;">
            Voltar para o App
        </button>
    </div>

    <script>
        const supabase = createClient(
            "https://otyxjcxxqwjotnuyrvmc.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk"
        );

        async function handleAuthCallback() {
            try {
                console.log('🔗 Processando callback de autenticação...');
                
                // Aguarda um pouco para garantir que a sessão foi salva
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    console.error('❌ Erro na sessão:', error);
                    throw error;
                }

                if (session) {
                    console.log('✅ Sessão encontrada, redirecionando...');
                    // 🔥 Tenta diferentes métodos de redirecionamento
                    voltarParaApp();
                } else {
                    console.error('❌ Nenhuma sessão encontrada');
                    // Tenta novamente após 3 segundos
                    setTimeout(voltarParaApp, 3000);
                }
            } catch (error) {
                console.error('❌ Erro no callback:', error);
                // Mesmo com erro, tenta voltar para o app
                setTimeout(voltarParaApp, 3000);
            }
        }

        function voltarParaApp() {
            console.log('🔄 Tentando voltar para o app...');
            
            // 🔥 MÚLTIPLAS ESTRATÉGIAS de redirecionamento
            try {
                // 1. Tenta deep link do Capacitor
                if (window.Capacitor && window.Capacitor.Plugins.App) {
                    window.Capacitor.Plugins.App.openUrl({ url: 'com.oubook.agendamento://' });
                }
                
                // 2. Tenta scheme do Android
                window.location.href = 'intent://oauth-callback#Intent;package=com.oubook.agendamento;scheme=com.oubook.agendamento;end;';
                
                // 3. Redireciona para URL principal após um tempo
                setTimeout(() => {
                    window.location.href = 'https://frontrender-iota.vercel.app';
                }, 1000);
                
            } catch (e) {
                console.error('Erro no redirecionamento:', e);
                // Fallback final
                window.location.href = 'https://frontrender-iota.vercel.app';
            }
        }

        // Inicia o processo quando a página carrega
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Página de callback carregada');
            setTimeout(handleAuthCallback, 1000);
        });

        // Também inicia se a página já estiver carregada
        if (document.readyState === 'complete') {
            setTimeout(handleAuthCallback, 1000);
        }
    </script>
</body>
</html>
