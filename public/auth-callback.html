<!DOCTYPE html>
<html>
<head>
    <title>Redirecionando...</title>
    <script>
        // 🔥 SIMPLESMENTE VOLTA PARA O APP
        // O login já foi feito via signInWithIdToken, não precisa processar nada
        function voltarParaApp() {
            // Tenta abrir o app
            window.location.href = 'com.oubook.agendamento://';
            
            // Fallback para web
            setTimeout(() => {
                window.location.href = 'https://frontrender-iota.vercel.app';
            }, 1000);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔗 Redirecionando para o app...');
            voltarParaApp();
        });
    </script>
</head>
<body>
    <div style="text-align: center; padding: 50px;">
        <h2>✅ Redirecionando...</h2>
        <p>Voltando para o aplicativo</p>
    </div>
</body>
</html>
