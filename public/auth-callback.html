<script>
    // ✅ SOLUÇÃO SUPER-EFETIVA PARA CAPACITOR
    async function fecharBrowserCapacitor() {
        console.log('🚀 Iniciando fechamento browser...');
        
        // Método 1: Tenta fechar via Capacitor
        if (window.Capacitor?.Plugins?.Browser) {
            try {
                console.log('📱 Tentando fechar via Capacitor Browser...');
                await window.Capacitor.Plugins.Browser.close();
                console.log('✅ Sucesso - browser fechado!');
                return;
            } catch (error) {
                console.log('❌ Falha método 1:', error);
            }
        }
        
        // Método 2: Tenta scheme customizado
        try {
            console.log('🔗 Tentando scheme customizado...');
            const appUrl = `com.oubook.agendamento://auth-callback${window.location.hash || ''}`;
            window.location.href = appUrl;
            
            // Fallback: fecha após timeout
            setTimeout(() => {
                if (!window.closed) {
                    window.close();
                }
            }, 1000);
        } catch (error) {
            console.log('❌ Falha método 2:', error);
        }
        
        // Método 3: Último recurso
        setTimeout(() => {
            if (!window.closed) {
                console.log('🔄 Tentando window.close()...');
                window.close();
            }
        }, 500);
    }

    // 🔥 EXECUTA IMEDIATAMENTE
    if (window.Capacitor) {
        console.log('🎯 Capacitor detectado - fechando browser...');
        fecharBrowserCapacitor();
    } else {
        console.log('🌐 Navegador web - redirecionando...');
        if (window.location.hash) {
            window.location.href = 'https://frontrender-iota.vercel.app/' + window.location.hash;
        } else {
            window.location.href = 'https://frontrender-iota.vercel.app/';
        }
    }
</script>
