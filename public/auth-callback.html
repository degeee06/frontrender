<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Concluído - Voltar para o App</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }
        
        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .auto-redirect {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">🎉</div>
        <h1>Login Concluído!</h1>
        <p>Seu login foi realizado com sucesso. Volte para o aplicativo para continuar usando o sistema de agendamentos.</p>
        
        <button class="btn" onclick="voltarParaApp()">Voltar para o App</button>
        
        <div class="auto-redirect" id="countdown">
            Voltando automaticamente em <span id="timer">3</span> segundos...
        </div>
    </div>

    <script>
        function voltarParaApp() {
            // Tenta abrir o app via deep link
            window.location.href = 'oubook://auth-callback';
            
            // Fallback: se não conseguir, fecha a janela
            setTimeout(() => {
                window.close();
            }, 1000);
        }
        
        // Contagem regressiva automática
        let seconds = 3;
        const timerElement = document.getElementById('timer');
        const countdown = setInterval(() => {
            seconds--;
            timerElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(countdown);
                voltarParaApp();
            }
        }, 1000);
        
        // Tenta voltar automaticamente após 3 segundos
        setTimeout(voltarParaApp, 3000);
    </script>
</body>
</html>
