<!DOCTYPE html>
<html>
<head>
    <title>Autenticando no Oubook...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Autenticando...</h2>
        <p>Redirecionando de volta para o app</p>
    </div>

  <script>
    // 🔥 CONFIGURAÇÃO DO SUPABASE (SUBSTITUA COM SUAS CREDENCIAIS!)
    const SUPABASE_URL = 'https://otyxjcxxqwjotnuyrvmc.supabase.co'; // 🔥 SUBSTITUA
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk'; // 🔥 SUBSTITUA

    async function processAuthentication() {
        console.log('🚀 Iniciando processamento de autenticação...');
        console.log('🔗 URL completa:', window.location.href);
        
        const isMobileApp = !!(window.Capacitor || window.cordova);
        console.log('📱 Ambiente:', isMobileApp ? 'APP' : 'WEB');

        if (isMobileApp) {
            handleMobileAuth();
        } else {
            await handleWebAuth();
        }
    }

    async function handleWebAuth() {
        try {
            console.log('🌐 Processando autenticação WEB...');
            
            // 🔥 INICIALIZA SUPABASE
            const { createClient } = window.supabase;
            const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // 🔥 IMPORTANTE: Verifica se tem parâmetros de autenticação
            const hasAuthParams = window.location.hash.includes('access_token') || 
                                 window.location.search.includes('access_token');
            
            if (!hasAuthParams) {
                console.log('❌ Nenhum token encontrado - redirecionando...');
                window.location.href = '/';
                return;
            }

            console.log('✅ Tokens encontrados na URL...');

            // 🔥🔥🔥 SOLUÇÃO CRÍTICA: Usa setSession para forçar a sessão
            if (window.location.hash) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const access_token = hashParams.get('access_token');
                const refresh_token = hashParams.get('refresh_token');
                
                if (access_token) {
                    console.log('🔑 Configurando sessão manualmente...');
                    const { data, error } = await supabase.auth.setSession({
                        access_token,
                        refresh_token
                    });
                    
                    if (error) {
                        console.error('❌ Erro ao configurar sessão:', error);
                    } else {
                        console.log('✅ Sessão configurada com sucesso!');
                        console.log('👤 Usuário:', data.session?.user?.email);
                    }
                }
            }

            // 🔥 AGUARDA UM POUCO PARA O SUPABASE PROCESSAR
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // 🔥 VERIFICA SE A SESSÃO FOI CRIADA
            const { data: { session } } = await supabase.auth.getSession();
            
            if (session) {
                console.log('🎉 AUTENTICAÇÃO BEM-SUCEDIDA!');
                console.log('📧 Email:', session.user.email);
                console.log('🔐 Token:', session.access_token ? '✅' : '❌');
                
                // 🔥 SALVA CONFIRMAÇÃO NO LOCALSTORAGE
                localStorage.setItem('auth_success', 'true');
                localStorage.setItem('user_email', session.user.email);
            } else {
                console.log('⚠️ Sessão não criada - tentando fallback...');
            }

            // 🔥 REDIRECIONA PARA PÁGINA PRINCIPAL
            console.log('🔄 Redirecionando para página principal...');
            window.location.href = '/';

        } catch (error) {
            console.error('💥 Erro crítico:', error);
            window.location.href = '/';
        }
    }

    function handleMobileAuth() {
        console.log('📱 Processando autenticação MOBILE...');
        const appUrl = `com.oubook.agendamento://auth-callback${window.location.hash || window.location.search}`;
        window.location.href = appUrl;
        
        setTimeout(() => {
            if (window.Capacitor?.Plugins?.Browser) {
                window.Capacitor.Plugins.Browser.close();
            }
        }, 1000);
    }

    // 🔥 EXECUTA QUANDO A PÁGINA CARREGA
    document.addEventListener('DOMContentLoaded', processAuthentication);
    if (document.readyState === 'complete') {
        processAuthentication();
    }
</script>
</body>
</html>
