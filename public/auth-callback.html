<!DOCTYPE html>
<html>
<head>
    <title>Authentication Callback</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <script>
        const { createClient } = supabase;
        
        const supabaseClient = createClient(
            "https://otyxjcxxqwjotnuyrvmc.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk"
        );

        async function handleCallback() {
            try {
                console.log('🔄 Processando callback...');
                
                // Aguarda o Supabase processar
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (session) {
                    console.log('✅ Sessão obtida:', session.user.email);
                    
                    // 🔥 PASSA O TOKEN E EMAIL VIA URL
                    const token = session.access_token;
                    const email = session.user.email;
                    
                    // Redireciona com os dados na URL
                    const redirectUrl = `https://frontrender-iota.vercel.app/?token=${token}&email=${encodeURIComponent(email)}&source=callback`;
                    console.log('🔗 Redirecionando para:', redirectUrl);
                    
                    window.location.href = redirectUrl;
                    
                } else {
                    console.log('❌ Nenhuma sessão encontrada');
                    window.location.href = 'https://frontrender-iota.vercel.app/?error=no_session';
                }
            } catch (error) {
                console.error('❌ Erro no callback:', error);
                window.location.href = 'https://frontrender-iota.vercel.app/?error=callback_error';
            }
        }

        document.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>
</html>
