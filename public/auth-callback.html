<!DOCTYPE html>
<html>
<head>
    <title>Authentication Callback</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <script>
        const { createClient } = supabase;
        
        const supabaseClient = createClient(
            "https://otyxjcxxqwjotnuyrvmc.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk"
        );

        async function handleCallback() {
            try {
                // Aguarda processamento
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (session) {
                    // 🔥 SALVA TUDO
                    localStorage.setItem('userToken', session.access_token);
                    localStorage.setItem('supabase_session', JSON.stringify(session));
                    localStorage.setItem('userEmail', session.user.email);
                    
                    // 🔥 VOLTA PARA O APP
                    window.location.href = 'https://frontrender-iota.vercel.app';
                }
            } catch (error) {
                console.error('Error:', error);
                window.location.href = 'https://frontrender-iota.vercel.app';
            }
        }

        document.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>
</html>
