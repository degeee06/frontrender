<!DOCTYPE html>
<html>
<head>
    <title>Authentication Callback</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <script>
        // Processa o callback de autenticação
        async function handleAuthCallback() {
            try {
                const supabase = createClient(
                    "https://otyxjcxxqwjotnuyrvmc.supabase.co",
                    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90eXhqY3h4cXdqb3RudXlydm1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MzU5MTQsImV4cCI6MjA3MzAxMTkxNH0.O6pWtKMQvsIQlOt7G6nIcDMMKoTJU-G-qpZiiE6Q3Hk"
                );

                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    throw error;
                }

                if (session) {
                    // Redireciona de volta para o app
                    window.location.href = '/';
                } else {
                    console.error('No session found');
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Error handling auth callback:', error);
                window.location.href = '/';
            }
        }

        handleAuthCallback();
    </script>
</body>
</html>
